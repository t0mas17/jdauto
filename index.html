<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JD Auto | Estarreja</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --red: #e63946; --bg: #f8f9fa; --card: #ffffff; --text: #212529; --green: #2ecc71; --gray: #6c757d; --orange: #f39c12; }
        body { font-family: 'Inter', sans-serif; margin: 0; background: var(--bg); color: var(--text); overflow-x: hidden; scroll-behavior: smooth; }
        
        header { background: rgba(255, 255, 255, 0.95); padding: 15px 40px; position: fixed; width: 100%; top: 0; z-index: 1000; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; backdrop-filter: blur(10px); }
        .logo { font-size: 26px; font-weight: 900; letter-spacing: -1px; cursor: pointer; color: #000; text-decoration: none; }
        .logo span { color: var(--red); }
        nav a { color: var(--gray); text-decoration: none; font-weight: 600; font-size: 11px; text-transform: uppercase; cursor: pointer; margin-left: 15px; transition: 0.3s; }

        .hero-premium { 
            height: 60vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; 
            background: linear-gradient(rgba(0,0,0,0.4) 0%, rgba(0,0,0,0.8) 100%), 
                        url('https://images.unsplash.com/photo-1552519507-da3b142c6e3d?q=80&w=1600&auto=format&fit=crop') center/cover no-repeat;
            color: white; padding: 0 20px; margin-top: 60px;
        }

        .search-container { max-width: 600px; margin: -30px auto 40px; background: white; padding: 10px; border-radius: 50px; display: flex; box-shadow: 0 10px 30px rgba(0,0,0,0.1); position: relative; z-index: 10; border: 1px solid #eee; }
        .search-container input { border: none; padding: 15px 25px; width: 100%; border-radius: 50px; outline: none; font-size: 16px; }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; padding: 0 20px; max-width: 1200px; margin: 0 auto; }
        .card { background: var(--card); border-radius: 15px; overflow: hidden; border: 1px solid #eee; transition: 0.3s; cursor: pointer; position: relative; }
        .card:hover { transform: translateY(-5px); border-color: var(--red); }
        .card img { width: 100%; height: 210px; object-fit: cover; }
        .card-body { padding: 20px; }

        .selos { display: flex; gap: 8px; margin-top: 10px; }
        .selo { font-size: 10px; background: #f1f3f5; padding: 4px 8px; border-radius: 4px; color: var(--gray); font-weight: bold; text-transform: uppercase; }

        .page { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 1500; overflow-y: auto; padding-top: 80px; }
        .page-content { max-width: 600px; margin: 0 auto; padding: 20px; }
        .close-btn { position: fixed; top: 20px; right: 30px; font-size: 40px; cursor: pointer; z-index: 1600; color: var(--gray); }

        .simulador-box { background: #fff5f5; padding: 20px; border-radius: 12px; border: 1px solid #ffebeb; margin: 20px 0; }
        .slider { width: 100%; margin: 15px 0; accent-color: var(--red); cursor: pointer; }

        input, select, textarea { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; font-family: inherit; box-sizing: border-box; }
        .btn-red { background: var(--red); color: white; border:none; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; text-transform: uppercase; }
        .btn-gray { background: #e9ecef; color: #495057; border:none; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; text-transform: uppercase; margin-top: 10px; }
        
        #box-estimativa { background: #e8f5e9; padding: 20px; border-radius: 12px; border: 1px solid #c8e6c9; margin: 15px 0; display: none; text-align: center; }
        #box-estimativa b { color: #2e7d32; font-size: 24px; display: block; margin-top: 5px; }

        .map-section { padding: 60px 20px; background: white; margin-top: 50px; border-top: 1px solid #eee; text-align: center; }
        iframe { width: 100%; max-width: 1100px; height: 350px; border-radius: 15px; border: none; }

        #dashboard-admin { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #f1f3f5; z-index: 3000; overflow-y: auto; padding: 20px; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; margin-top: 20px; }
        td, th { padding: 12px; border-bottom: 1px solid #eee; text-align: left; }
        #login-overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:5000; justify-content:center; align-items:center; backdrop-filter: blur(5px); }
    </style>
</head>
<body>

<header>
    <div class="logo" onclick="location.reload()">JD <span>AUTO</span></div>
    <nav>
        <a href="#seccao-stock">Stock</a>
        <a onclick="abrirPagina('page-oficina')">Oficina</a>
        <a onclick="abrirPagina('page-venda')">Vender Carro</a>
        <a onclick="document.getElementById('login-overlay').style.display='flex'">🔐</a>
    </nav>
</header>

<section class="hero-premium">
    <h1>JD <span>AUTO</span> ESTARREJA</h1>
    <p>Os melhores usados e serviços mecânicos de confiança.</p>
</section>

<div class="search-container">
    <input type="text" id="filtro-texto" placeholder="Pesquise por marca ou modelo..." onkeyup="Portal.filtrar()">
</div>

<section id="seccao-stock">
    <div class="grid" id="grid-cliente"></div>
</section>

<section class="map-section">
    <h2 style="margin-bottom: 30px; font-weight: 900;">Visite-nos em Estarreja</h2>
    <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3023.238466649856!2d-8.572455923422073!3d40.73477193621437!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0xd239ca66e74fee7%3A0xcdcb998d22f72837!2sJD%20Auto!5e0!3m2!1spt-PT!2spt!4v1710000000000!5m2!1spt-PT!2spt" allowfullscreen="" loading="lazy"></iframe>
</section>

<div id="login-overlay">
    <div style="background:white; padding:40px; border-radius:20px; text-align:center; width:320px;">
        <h3 style="margin-top:0">Gestão JD Auto</h3>
        <input type="password" id="pin-input" placeholder="PIN" style="text-align:center; font-size:24px;">
        <button class="btn-red" onclick="Portal.verificarLogin()">ENTRAR</button>
        <button class="btn-gray" onclick="document.getElementById('login-overlay').style.display='none'">VOLTAR AO SITE</button>
    </div>
</div>

<div id="page-venda" class="page">
    <span class="close-btn" onclick="fecharTodas()">×</span>
    <div class="page-content">
        <h2 style="text-align:center">Avalie o seu Carro</h2>
        <form onsubmit="Portal.enviarVenda(event)" style="background:white; padding:30px; border-radius:15px; border:1px solid #eee;">
            <input type="text" id="venda-carro" placeholder="Viatura (Ex: Opel Corsa 2017)" required>
            <input type="number" id="venda-km" placeholder="Quilómetros" oninput="Portal.calcularRetoma()" required>
            <input type="number" id="venda-pretensao" placeholder="Quanto pretende receber (€)" oninput="Portal.calcularRetoma()" required>
            <select id="venda-estado" onchange="Portal.calcularRetoma()">
                <option value="1">Impecável</option>
                <option value="0.9">Bom estado</option>
                <option value="0.8">Razoável</option>
                <option value="0.6">Mau estado</option>
            </select>
            <textarea id="venda-notas" placeholder="Detalhes adicionais..." rows="3" style="resize:none;"></textarea>
            <div id="box-estimativa">
                <span>Estimativa de Retoma:</span>
                <b id="valor-estimado">0 €</b>
            </div>
            <button type="submit" class="btn-red">ENVIAR PROPOSTA</button>
        </form>
    </div>
</div>

<div id="page-oficina" class="page">
    <span class="close-btn" onclick="fecharTodas()">×</span>
    <div class="page-content">
        <h2 style="text-align:center">Marcação Oficina</h2>
        <form onsubmit="Portal.agendar(event)" style="background:white; padding:30px; border-radius:15px; border:1px solid #eee;">
            <input type="text" id="srv-carro" placeholder="Viatura" required>
            <select id="srv-tipo">
                <option>Revisão Geral</option><option>Travões</option><option>Pneus</option>
            </select>
            <div style="display:flex; gap:10px;"><input type="date" id="srv-data" required><input type="time" id="srv-hora" required></div>
            <textarea id="srv-notas" placeholder="Notas..." rows="3" style="resize:none;"></textarea>
            <button type="submit" class="btn-red">MARCAR AGORA</button>
        </form>
    </div>
</div>

<div id="modal-detalhes" class="page">
    <span class="close-btn" onclick="fecharTodas()">×</span>
    <div class="page-content" id="conteudo-detalhes" style="max-width:1000px"></div>
</div>

<div id="dashboard-admin">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h2>Gestão JD Auto</h2>
        <button onclick="location.reload()" style="cursor:pointer">Sair</button>
    </div>
    <div style="display:grid; grid-template-columns: 1fr 2fr; gap:20px; margin-top:20px;">
        <div style="background:white; padding:20px; border-radius:10px;">
            <h4>Novo Carro</h4>
            <input type="text" id="add-tit" placeholder="Marca/Modelo">
            <input type="number" id="add-pre" placeholder="Preço €">
            <input type="text" id="add-img" placeholder="URL Foto">
            <textarea id="add-desc" placeholder="Detalhes" rows="3"></textarea>
            <button class="btn-red" onclick="Portal.inserir()">PUBLICAR</button>
        </div>
        <div style="background:white; padding:20px; border-radius:10px;">
            <table><thead><tr><th>Carro</th><th>Ações</th></tr></thead><tbody id="lista-admin"></tbody></table>
        </div>
    </div>
</div>

<script>
    const URL_S = 'https://nhmhlcipomnshywkxwpl.supabase.co';
    const KEY_S = 'sb_publishable_r98j53EhXUKlSOrpeuxxCg_uTvz-5qM';
    const supa = window.supabase.createClient(URL_S, KEY_S);

    const Portal = {
        lista: [],
        isAdmin: false,

        init: async function() {
            const { data } = await supa.from('carros').select('*').order('created_at', {ascending: false});
            if (data) { this.lista = data; this.renderSite(this.lista); if(this.isAdmin) this.renderDash(); }
        },

        renderSite: function(dados) {
            const grid = document.getElementById('grid-cliente');
            grid.innerHTML = "";
            dados.filter(c => !c.vendido).forEach(c => {
                const res = c.descricao && c.descricao.includes("[RESERVADO]");
                grid.innerHTML += `
                    <div class="card" onclick="Portal.verDetalhes(${c.id})">
                        ${res ? '<div style="position:absolute; top:10px; left:10px; background:var(--red); color:white; padding:4px 10px; border-radius:50px; font-size:10px; font-weight:900; z-index:5;">RESERVADO</div>' : ''}
                        <img src="${c.imagem_url}" onerror="this.src='https://via.placeholder.com/400x250?text=JD+AUTO'">
                        <div class="card-body">
                            <div style="font-weight:900; font-size:18px;">${c.titulo}</div>
                            <div style="color:var(--red); font-size:22px; font-weight:900;">${Number(c.preco).toLocaleString()} €</div>
                            <div class="selos">
                                <span class="selo">🛡️ Garantia</span>
                                <span class="selo">🔧 Revisado</span>
                            </div>
                        </div>
                    </div>`;
            });
        },

        filtrar: function() {
            const txt = document.getElementById('filtro-texto').value.toLowerCase();
            this.renderSite(this.lista.filter(c => c.titulo.toLowerCase().includes(txt)));
        },

        verDetalhes: function(id) {
            const c = this.lista.find(carro => carro.id === id);
            const container = document.getElementById('conteudo-detalhes');
            const mMin = Math.round(c.preco / 120);
            const mMax = Math.round(c.preco / 12);
            container.innerHTML = `
                <div style="display:flex; flex-wrap:wrap; gap:30px;">
                    <img src="${c.imagem_url}" style="flex:1.2; min-width:300px; border-radius:15px; width:100%; object-fit:cover;">
                    <div style="flex:1; min-width:300px;">
                        <h1>${c.titulo}</h1>
                        <div class="simulador-box">
                            <p>Quanto quer pagar por mês?</p>
                            <h2 id="resultadoMensal" style="color:var(--red); margin:10px 0;">${Math.round(c.preco/84)}€</h2>
                            <input type="range" min="${mMin}" max="${mMax}" value="${Math.round(c.preco/84)}" class="slider" id="mSlider" oninput="Portal.calc(${c.preco})">
                            <p style="font-size:14px;">Prazo: <b id="prazoFinal">84</b> meses</p>
                        </div>
                        <p>${c.descricao || ''}</p>
                        <a href="https://wa.me/351912345678?text=Interesse no ${c.titulo}" target="_blank" class="btn-red" style="text-decoration:none; display:block; text-align:center">RESERVAR</a>
                    </div>
                </div>`;
            abrirPagina('modal-detalhes');
        },

        calc: function(total) {
            const val = document.getElementById('mSlider').value;
            let meses = Math.round(total / val);
            if(meses > 12) meses = Math.round(meses / 12) * 12;
            document.getElementById('resultadoMensal').innerText = val + "€";
            document.getElementById('prazoFinal').innerText = meses;
        },

        calcularRetoma: function() {
            const pretensao = document.getElementById('venda-pretensao').value;
            const estado = document.getElementById('venda-estado').value;
            const km = document.getElementById('venda-km').value;
            if(pretensao > 0) {
                document.getElementById('box-estimativa').style.display = "block";
                let penalizacaoKm = km > 200000 ? 0.85 : (km > 100000 ? 0.95 : 1);
                let estimativa = Math.round(pretensao * estado * penalizacaoKm);
                document.getElementById('valor-estimado').innerText = estimativa.toLocaleString() + " €";
            }
        },

        enviarVenda: function(e) {
            e.preventDefault();
            const msg = `*AVALIAÇÃO*%0A🚗 *Viatura:* ${document.getElementById('venda-carro').value}%0A\n*KM:* ${document.getElementById('venda-km').value}%0A💰 *Estimativa:* ${document.getElementById('valor-estimado').innerText}`;
            window.open(`https://wa.me/351912345678?text=${msg}`, '_blank');
        },

        agendar: function(e) {
            e.preventDefault();
            const msg = `*MARCAÇÃO*%0A🚗 *Carro:* ${document.getElementById('srv-carro').value}%0A📅 *Data:* ${document.getElementById('srv-data').value}`;
            window.open(`https://wa.me/351912345678?text=${msg}`, '_blank');
        },

        verificarLogin: function() {
            if(document.getElementById('pin-input').value === "jdauto2024") {
                this.isAdmin = true;
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('dashboard-admin').style.display = 'block';
                this.renderDash();
            } else { alert("PIN Errado"); }
        },

        renderDash: function() {
            const tbody = document.getElementById('lista-admin');
            tbody.innerHTML = "";
            this.lista.filter(c => !c.vendido).forEach(c => {
                const res = c.descricao && c.descricao.includes("[RESERVADO]");
                tbody.innerHTML += `<tr><td>${c.titulo}</td><td>
                    <button onclick="Portal.vender(${c.id})" style="background:green; color:white; border:none; padding:5px; border-radius:5px; cursor:pointer">Vender</button>
                    <button onclick="Portal.reservar(${c.id}, '${c.descricao}', ${!res})" style="background:orange; color:white; border:none; padding:5px; border-radius:5px; cursor:pointer">${res?'Soltar':'Reservar'}</button>
                    <button onclick="Portal.eliminar(${c.id})" style="background:gray; color:white; border:none; padding:5px; border-radius:5px; cursor:pointer">Apagar</button>
                </td></tr>`;
            });
        },

        reservar: async function(id, desc, status) {
            const novaDesc = status ? "[RESERVADO] " + desc : desc.replace("[RESERVADO] ", "");
            await supa.from('carros').update({ descricao: novaDesc }).eq('id', id);
            this.init();
        },

        eliminar: async function(id) { if(confirm("Apagar?")) { await supa.from('carros').delete().eq('id', id); this.init(); } },
        vender: async function(id) { await supa.from('carros').update({ vendido: true }).eq('id', id); this.init(); },
        inserir: async function() {
            const t = document.getElementById('add-tit').value;
            const p = document.getElementById('add-pre').value;
            const i = document.getElementById('add-img').value;
            const d = document.getElementById('add-desc').value;
            await supa.from('carros').insert([{ titulo: t, preco: p, imagem_url: i, descricao: d, vendido: false }]);
            location.reload();
        }
    };

    function abrirPagina(id) { fecharTodas(); document.getElementById(id).style.display = "block"; document.body.style.overflow = "hidden"; }
    function fecharTodas() { document.querySelectorAll('.page').forEach(p => p.style.display="none"); document.body.style.overflow = "auto"; }
    window.onload = () => {
        Portal.init();
        document.getElementById('pin-input').addEventListener('keypress', (e) => { if(e.key === 'Enter') Portal.verificarLogin(); });
    };
</script>
</body>
</html>
